<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- ✅ IMPORTANT -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- ✅ responsive -->

    <link href="currency.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    <title>Currency Converter</title>
</head>

<body>
    <div class="container">
        <h2>Currency Converter</h2>

        <form>
            <div class="amount">
                <p>Enter Amount</p>

                <!-- ✅ type="number" better -->
                <input value="100" type="number">

                <div class="dropdown">

                    <!-- FROM -->
                    <div class="from">
                        <p>From</p>
                        <div class="selectcontainer">
                            <img src="https://flagsapi.com/US/flat/64.png">
                            <select name="from"></select>
                        </div>
                    </div>

                    <i class="fa fa-exchange"></i>

                    <!-- TO -->
                    <div class="to">
                        <p>To</p>
                        <div class="selectcontainer">
                            <img src="https://flagsapi.com/IN/flat/64.png">
                            <select name="to"></select>
                        </div>
                    </div>

                </div>

                <div class="msg">1 USD = 80 INR</div>

                <!-- ✅ Explicit type -->
                <button type="submit">Get Exchange Rates</button>
            </div>
        </form>
    </div>

    <!-- ✅ IMPORTANT: countryList पहले load होना चाहिए -->
    <script src="code.js"></script>

    <!-- ✅ Main JS -->
    <script src="currency.js"></script>
</body>
</html>
